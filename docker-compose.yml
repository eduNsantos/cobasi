version: '3.8'

services:
  mongo:
    image: mongo:8.2
    container_name: cobasi-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - cobasi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: cobasi-backend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongo:27017/cobasi?authSource=admin
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cobasi-network

volumes:
  mongo_data:

networks:
  cobasi-network:
    driver: bridge
